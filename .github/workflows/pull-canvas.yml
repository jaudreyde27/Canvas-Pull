name: Pull Canvas Files

on:
  workflow_dispatch:
    inputs:
      course_id:
        description: "Canvas course ID (the number in the course URL)"
        required: true
        type: string
      module_filter:
        description: "Optional: only download from modules whose name contains this text (case-insensitive)"
        required: false
        default: ""
        type: string

jobs:
  pull:
    name: Download course files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull files from Canvas
        env:
          CANVAS_TOKEN: ${{ secrets.CANVAS_TOKEN }}
          CANVAS_COURSE_ID: ${{ inputs.course_id }}
          MODULE_FILTER: ${{ inputs.module_filter }}
        run: python pull_canvas.py

      - name: Upload downloaded files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: canvas-files-course-${{ inputs.course_id }}
          path: downloads/
          if-no-files-found: warn
          # Artifacts are kept for 90 days by default
          retention-days: 90
